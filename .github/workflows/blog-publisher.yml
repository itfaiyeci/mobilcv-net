name: Blog Publisher

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu indir
        uses: actions/checkout@v3

      - name: .NET 8 kur
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Makaleyi üret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd MobilCV.AIEngine
          dotnet restore
          dotnet run

      - name: Değişiklikleri gönder
        run: |
          git config user.name "MobilCV Bot"
          git config user.email "bot@mobilcv.net"
          git add .
          git diff --cached --quiet || git commit -m "Otomatik makale $(date -u +'%Y-%m-%d')"
          git push

      - name: E-posta bildirimi gönder
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{secrets.MAIL_USERNAME}}
          password: ${{secrets.MAIL_PASSWORD}}
          subject: "✅ Yeni makale yayınlandı - MobilCV"
          to: ${{secrets.MAIL_TO}}
          from: MobilCV Bot
          body: |
            Merhaba,

            MobilCV botu yeni bir makale oluşturdu ve yayınladı.

            Tarih: $(date -u +'%Y-%m-%d %H:%M UTC')
            Makale: https://mobilcv.net

            İyi okumalar!
            MobilCV Bot
